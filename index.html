<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="0.9em" font-size="90">❤️</text></svg>'>
<title>I love you <3</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    .screen {
        position: absolute;
        width: 100%;
        height: 100vh;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 1s ease;
    }

    #screen1 {
        background-color: #121212;
        z-index: 2;
    }

    #screen2 {
        background: radial-gradient(circle at center, #0d0d1a, #000);
        opacity: 0;
        pointer-events: none;
        perspective: 1000px;
    }

    .intro-text {
        color: white;
        margin-bottom: 25px;
        font-size: 1.2rem;
        opacity: 0.8;
    }

    .btn {
        background-color: #1DB954;
        border: none;
        border-radius: 50%;
        width: 150px;
        height: 150px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    .btn img {
        width: 80px;
    }

    #scene {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #heart {
        position: relative;
        transform-style: preserve-3d;
        animation: rotate 20s infinite linear;
    }

    .word {
        position: absolute;
        color: #ea80b0;
        font-size: 1rem;
        text-shadow: 0 0 10px #fff;
        letter-spacing: 2px;
        white-space: nowrap;
        transform: translate(-50%, -50%);
        backface-visibility: hidden;
    }

    @keyframes rotate {
        0% {
            transform: rotateY(0deg) rotateX(10deg);
        }
        100% {
            transform: rotateY(360deg) rotateX(10deg);
        }
    }
</style>
</head>

<body>

<div id="screen1" class="screen">
    <div class="intro-text" style="color: white; margin-bottom: 25px; font-size: 3.6rem; opacity: 0.8; text-align: center;">
        Clique e volte aqui logo depois 😉
    </div>
    <button class="btn" onclick="startExperience()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
    </button>
</div>

<div id="screen2" class="screen">
    <div id="scene">
        <div id="heart"></div>
    </div>
</div>

<script>
function startExperience() {
    window.open("https://open.spotify.com/track/2XUx8PCXGpP1XhZJMGiUol", "_blank");

    document.getElementById("screen1").style.opacity = "0";
    
    setTimeout(() => {
        document.getElementById("screen1").style.display = "none";
        let s2 = document.getElementById("screen2");
        s2.style.opacity = "1";
        s2.style.pointerEvents = "auto";
    }, 800);

    createHeart();
}

function createHeart() {
    const heart = document.getElementById("heart");

    const scale = 15;
    const depth = 200;

    for (let t = 0; t < Math.PI * 2; t += 0.15) {

        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t)
                - 5 * Math.cos(2*t)
                - 2 * Math.cos(3*t)
                - Math.cos(4*t));

        for (let z = -depth; z <= depth; z += 40) {

            let span = document.createElement("span");
            span.className = "word";
            span.innerText = "I love you";

            span.style.left = (x * scale) + "px";
            span.style.top = (y * scale) + "px";
            span.style.transform = `
                translate(-50%, -50%)
                translateZ(${z}px)
                rotateY(${z < 0 ? 180 : 0}deg)
            `;

            heart.appendChild(span);
        }
    }
}
</script>

</body>
</html>
